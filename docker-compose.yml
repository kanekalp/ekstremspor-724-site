services:
  db:
    image: postgres:17-alpine
    container_name: extremspor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-extremspor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-extremspor}
      POSTGRES_DB: ${POSTGRES_DB:-extremspor}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Scripts in /docker-entrypoint-initdb.d/ are executed in alphabetical
      # order the first time the data dir is empty — so the schema only
      # bootstraps once. Wipe the `pgdata` volume to force a re-run.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-extremspor} -d ${POSTGRES_DB:-extremspor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skynet
    # Expose port to host so `psql` from the host machine still works.
    # Internal container-to-container traffic uses the `db` hostname.
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extremspor-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Server-side connection — uses the compose-network DNS name `db`.
      DATABASE_URL: postgres://${POSTGRES_USER:-extremspor}:${POSTGRES_PASSWORD:-extremspor}@db:5432/${POSTGRES_DB:-extremspor}
      NODE_ENV: production
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-extremspor_session}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS}
      UPLOADS_DIR: /app/uploads
    volumes:
      # Evidence screenshots live here. Survives container rebuilds.
      - uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - skynet

volumes:
  pgdata:
  uploads:

networks:
  skynet:
    driver: bridge
